<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trailbound — HUD + Daily Login Event Modal V3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; width: 100vw; height: 100vh; font-family: 'Nunito', sans-serif; }

  .scale-wrapper { width: 1920px; height: 1080px; transform-origin: 0 0; position: absolute; }
  .frame { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
  .bg-image { position: absolute; width: 3363px; height: 2230px; left: calc(50% - 61.5px); top: calc(50% + 176px); transform: translate(-50%, -50%); object-fit: cover; pointer-events: none; }
  .caravan { position: absolute; top: 13.43%; left: 23.28%; right: 27.45%; bottom: 14.72%; pointer-events: none; }
  .caravan img { width: 100%; height: 100%; object-fit: cover; }
  .hud-component { position: absolute; left: 1225px; top: 48px; width: 695px; height: 96px; }
  .hud-buttons { position: absolute; top: 0; left: 0; right: 119px; bottom: 0; display: flex; gap: 24px; align-items: center; }
  .hud-btn { width: 96px; height: 96px; flex-shrink: 0; position: relative; }
  .hud-btn img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }

  .modal-backdrop { position: absolute; inset: 0; background: rgba(33,44,60,0.6); z-index: 50; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }

  /* === DS: UIModal outer frame === */
  .modal-outer {
    background: linear-gradient(to top, rgba(141,112,91,0.9), rgba(108,85,72,0.9));
    border: 4px solid #212c3c; border-radius: 24px;
    width: 1020px; position: relative;
  }
  .modal-titlebar {
    position: relative; display: flex; align-items: center; justify-content: center;
    padding: 14px 16px 10px;
  }
  .modal-title {
    font-weight: 800; color: #faf093; font-size: 20px; letter-spacing: -0.3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.35);
  }
  .close-btn {
    position: absolute; right: 12px; top: 10px;
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(to bottom, #e85050, #c03030);
    border: 2px solid #a02020; box-shadow: 0 2px 0 0 #801818;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.1s;
    color: white; font-size: 16px; font-weight: 800; line-height: 1;
    font-family: 'Nunito', sans-serif;
  }
  .close-btn:active { transform: scale(0.9); }

  /* === Inner cream panel — 2-column layout === */
  .modal-inner {
    margin: 0 12px 12px; background: #fff7e6; border: 1px solid #cea98e;
    border-radius: 12px; display: flex; overflow: hidden;
  }

  /* === Left Panel (Banner) === */
  .left-panel {
    width: 280px; flex-shrink: 0;
    background: linear-gradient(180deg, #c03030 0%, #d06020 30%, #f09030 60%, #faf093 100%);
    padding: 20px; display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .left-panel-lanterns {
    position: absolute; top: 12px; right: 12px; font-size: 32px; opacity: 0.5;
    animation: lanternFloat 3s ease-in-out infinite;
  }
  @keyframes lanternFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .left-panel .lp-timer {
    background: rgba(0,0,0,0.2); border-radius: 8px; padding: 4px 10px;
    font-size: 11px; font-weight: 800; color: #fff7e6; align-self: flex-start;
    margin-bottom: 12px;
  }
  .left-panel .lp-title {
    font-size: 22px; font-weight: 800; color: #fff7e6;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4); line-height: 1.15; margin-bottom: 6px;
  }
  .left-panel .lp-counter {
    font-size: 13px; font-weight: 700; color: rgba(255,247,230,0.85); margin-bottom: 16px;
  }
  .left-panel .lp-progress { margin-bottom: auto; }
  .left-panel .lp-progress-bar {
    width: 100%; height: 14px; background: rgba(0,0,0,0.2); border-radius: 7px; overflow: hidden;
  }
  .left-panel .lp-progress-fill {
    height: 100%; background: linear-gradient(to right, #82cd5f, #5a9e4b);
    border-radius: 7px; transition: width 0.4s ease;
  }
  .left-panel .lp-progress-text {
    font-size: 24px; font-weight: 800; color: #fff7e6; margin-top: 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .left-panel .lp-progress-text span { font-size: 14px; font-weight: 700; opacity: 0.7; }

  .left-panel .lp-art {
    width: 160px; height: 160px; margin: 16px auto 0; opacity: 0.25;
    border: 3px solid rgba(255,247,230,0.2); border-radius: 16px;
    display: flex; align-items: center; justify-content: center; font-size: 64px;
  }

  .left-panel .lp-footer {
    display: flex; flex-direction: column; gap: 6px; margin-top: 12px;
  }
  .left-panel .lp-link {
    font-size: 11px; font-weight: 700; color: rgba(255,247,230,0.75);
    cursor: pointer; background: none; border: none; font-family: 'Nunito', sans-serif;
    text-align: left;
  }
  .left-panel .lp-link:hover { color: #fff7e6; text-decoration: underline; }
  .left-panel .lp-message {
    font-size: 11px; font-weight: 700; color: rgba(255,247,230,0.6);
    padding: 6px 10px; background: rgba(0,0,0,0.15); border-radius: 8px;
    text-align: center;
  }

  /* === Right Panel (Rewards) === */
  .right-panel { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; }

  /* === Day Cards Grid: 4-col grid, row1=1-4, row2=5,6,7(span2) === */
  .day-cards-area { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .day-card.big { grid-column: span 2; }

  /* === Single Day Card === */
  .day-card {
    flex: 1; border-radius: 12px; overflow: hidden;
    border: 3px solid #cea98e; background: #ead1b8;
    display: flex; flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative; cursor: default;
  }
  .day-card-header {
    background: linear-gradient(to bottom, #cea98e, #b0896b);
    padding: 4px 0 3px; text-align: center; position: relative;
  }
  .day-card-header .day-num { font-size: 26px; font-weight: 800; color: #fff7e6; text-shadow: 0 1px 2px rgba(0,0,0,0.2); line-height: 1; }
  .day-card-header .day-label { font-size: 9px; font-weight: 700; color: rgba(255,247,230,0.8); text-transform: uppercase; letter-spacing: 0.5px; }
  .status-badge { display: block; text-align: center; font-size: 9px; font-weight: 800; padding: 2px 0; letter-spacing: 0.3px; }
  .day-card-body {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 6px 6px 8px; gap: 3px;
  }
  .card-reward-icon { width: 52px; height: 52px; border-radius: 8px; padding: 2px; background: #cea98e; }
  .card-reward-inner { width: 100%; height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .card-reward-inner.common { background: #EFFBBA; }
  .card-reward-inner.uncommon { background: #EFFBBA; }
  .card-reward-inner.rare { background: #BBF4F5; }
  .card-reward-inner.epic { background: #EED3FF; }
  .card-reward-inner.exclusive { background: #FFD699; }
  .card-reward-name { font-size: 9px; font-weight: 700; color: #6c5548; text-align: center; line-height: 1.15; }
  .card-reward-qty { font-size: 10px; font-weight: 800; color: #8d705b; }
  .card-cat-badge { font-size: 7px; font-weight: 800; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
  .card-cat-badge.cat-gold { background: #faf093; color: #8d705b; }
  .card-cat-badge.cat-material { background: #d4edda; color: #34794b; }
  .card-cat-badge.cat-pack { background: #BBF4F5; color: #2a7a7c; }
  .card-cat-badge.cat-furniture { background: #EED3FF; color: #7a4d99; }
  .card-cat-badge.cat-cosmetic { background: #FFD699; color: #8d5a1f; }
  .card-cat-badge.cat-pet { background: #FFD699; color: #8d5a1f; }

  /* === Big milestone card (Day 7) — takes 2 columns width === */
  .day-card.big {
    border-color: #FFD699;
  }
  .day-card.big .card-reward-icon { width: 64px; height: 64px; }
  .day-card.big .card-reward-inner { font-size: 30px; }
  .day-card.big .day-card-header .day-num { font-size: 30px; }
  .day-card.big .card-reward-name { font-size: 11px; font-weight: 800; }
  .day-card.big .card-reward-qty { font-size: 12px; }
  .day-card.big .day-card-header::before {
    content: '\2B50'; position: absolute; top: 2px; right: 6px; font-size: 14px;
  }

  /* === STATE: Claimed === */
  .day-card.claimed { border-color: #34794b; }
  .day-card.claimed .day-card-header { background: linear-gradient(to bottom, #5a9e4b, #34794b); }
  .day-card.claimed .status-badge { background: #34794b; color: #EFFBBA; }
  .day-card.claimed .day-card-body { opacity: 0.7; }
  .day-card.claimed .card-reward-icon { position: relative; }
  .day-card.claimed .card-reward-icon::after {
    content: '\2713'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 800; color: #34794b;
    background: rgba(255,255,255,0.5); border-radius: 6px;
  }

  /* === STATE: Claimable === */
  .day-card.claimable {
    border-color: #d06020;
    box-shadow: 0 0 16px rgba(240,144,48,0.5), 0 0 4px rgba(240,144,48,0.3);
    animation: cardGlow 1.8s ease-in-out infinite; cursor: pointer;
    transform: translateY(-4px);
  }
  .day-card.claimable .day-card-header { background: linear-gradient(to bottom, #f09030, #d06020); }
  .day-card.claimable .status-badge { background: #d06020; color: #fff7e6; }
  .day-card.claimable:hover { transform: translateY(-6px); box-shadow: 0 0 20px rgba(240,144,48,0.6), 0 0 6px rgba(240,144,48,0.4); }
  .day-card.claimable:active { transform: translateY(-2px) scale(0.96); }
  @keyframes cardGlow {
    0%, 100% { box-shadow: 0 0 12px rgba(240,144,48,0.4), 0 0 3px rgba(240,144,48,0.2); }
    50% { box-shadow: 0 0 20px rgba(240,144,48,0.6), 0 0 6px rgba(240,144,48,0.4); }
  }

  /* === STATE: Upcoming === */
  .day-card.upcoming { opacity: 0.55; }
  .day-card.upcoming .day-card-header { background: linear-gradient(to bottom, #cea98e, #b0896b); }
  .day-card.upcoming .status-badge { background: #b0896b; color: #ead1b8; }
  .day-card.upcoming .day-card-body { filter: blur(1px); }

  /* === STATE: Unclaimed (missed) === */
  .day-card.unclaimed { opacity: 0.6; }
  .day-card.unclaimed .day-card-header { background: linear-gradient(to bottom, #a08070, #8a6b5a); }
  .day-card.unclaimed .status-badge { background: #c05040; color: #fff7e6; }
  .day-card.unclaimed .day-card-body { filter: saturate(0.3); }
  .day-card.unclaimed .card-reward-icon { position: relative; }
  .day-card.unclaimed .card-reward-icon::after {
    content: '\2014'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #a05040;
    background: rgba(255,255,255,0.4); border-radius: 6px;
  }

  /* === Claim button === */
  .modal-footer {
    display: flex; align-items: center; justify-content: flex-end;
    margin-top: 10px; padding-top: 10px; border-top: 2px solid #ead1b8;
  }
  .btn-primary {
    padding: 10px 32px; border-radius: 12px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    color: white; cursor: pointer; user-select: none;
    background: linear-gradient(to bottom, #f09030, #d06020);
    box-shadow: 0 3px 0 0 #a04010; transition: all 0.1s ease-out;
  }
  .btn-primary:hover { background: linear-gradient(to bottom, #f8a050, #d87030); }
  .btn-primary:active { transform: scale(0.92) translateY(2px); box-shadow: 0 1px 0 0 #a04010; }
  .btn-primary.claimed-state { background: linear-gradient(to bottom, #82cd5f, #5a9e4b); box-shadow: 0 3px 0 0 #34794b; cursor: default; }

  /* === Claim flash animations === */
  .claim-flash { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; border-radius: 9px; overflow: hidden; animation: flashIn 0.3s ease; }
  .claim-flash-content { text-align: center; position: relative; z-index: 2; }
  .claim-flash-icon { font-size: 32px; }
  .claim-flash-text { font-size: 10px; font-weight: 800; color: #34794b; margin-top: 3px; }
  .claim-flash.r-common { background: rgba(239,251,186,0.92); }
  .claim-flash.r-common .claim-flash-icon { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .claim-flash.r-uncommon { background: rgba(239,251,186,0.92); }
  .claim-flash.r-uncommon .claim-flash-icon { animation: popBounce 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .claim-flash.r-rare { background: rgba(187,244,245,0.92); }
  .claim-flash.r-rare .claim-flash-content { animation: cardFlip 0.7s ease; }
  .claim-flash.r-epic { background: rgba(238,211,255,0.92); }
  .claim-flash.r-epic .claim-flash-content { animation: cardFlip 0.7s ease; }
  .claim-flash.r-epic::before, .claim-flash.r-epic::after { content: ''; position: absolute; inset: -20px; z-index: 1; background: radial-gradient(circle, rgba(238,211,255,0.6) 0%, transparent 70%); animation: particleBurst 1s ease-out; }
  .claim-flash.r-epic::after { animation-delay: 0.15s; transform: rotate(45deg); }
  .claim-flash.r-exclusive { background: rgba(255,214,153,0.95); }
  .claim-flash.r-exclusive .claim-flash-content { animation: celebrationPop 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .claim-flash.r-exclusive::before { content: ''; position: absolute; inset: -30px; z-index: 1; background: radial-gradient(circle, rgba(255,214,153,0.8) 0%, rgba(240,144,48,0.3) 40%, transparent 70%); animation: celebrationRing 1.2s ease-out; }
  .claim-flash.r-exclusive .claim-flash-text { color: #8d5a1f; }
  .claim-particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: particleFly 0.8s ease-out forwards; }

  @keyframes flashIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes popBounce { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
  @keyframes cardFlip { 0% { transform: perspective(400px) rotateY(90deg); opacity: 0; } 40% { transform: perspective(400px) rotateY(-10deg); opacity: 1; } 60% { transform: perspective(400px) rotateY(5deg); } 100% { transform: perspective(400px) rotateY(0); } }
  @keyframes particleBurst { 0% { transform: scale(0.3); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }
  @keyframes celebrationPop { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.3); opacity: 1; } 60% { transform: scale(0.85); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
  @keyframes celebrationRing { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
  @keyframes particleFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx,20px),var(--dy,20px)) scale(0.3); opacity: 0; } }

  /* === Milestone celebration === */
  .milestone-celebration { position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(33,44,60,0.85); border-radius: 20px; animation: flashIn 0.3s ease; }
  .milestone-celebration-content { text-align: center; animation: celebrationPop 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .milestone-celebration .mc-icon { font-size: 64px; margin-bottom: 8px; }
  .milestone-celebration .mc-title { font-size: 24px; font-weight: 800; color: #faf093; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .milestone-celebration .mc-subtitle { font-size: 14px; font-weight: 700; color: #ead1b8; margin-top: 4px; }
  .milestone-celebration .mc-reward-name { font-size: 18px; font-weight: 800; color: #fff7e6; margin-top: 12px; padding: 6px 20px; border-radius: 8px; background: linear-gradient(to bottom, rgba(240,144,48,0.4), rgba(208,96,32,0.4)); border: 1px solid rgba(240,144,48,0.5); }
  .milestone-celebration .mc-dismiss { margin-top: 16px; font-size: 11px; font-weight: 700; color: rgba(234,209,184,0.6); cursor: pointer; background: none; border: none; font-family: 'Nunito', sans-serif; }
  .milestone-celebration .mc-dismiss:hover { color: #ead1b8; }
  .milestone-ring { position: absolute; width: 180px; height: 180px; border-radius: 50%; border: 3px solid rgba(250,240,147,0.4); animation: celebrationRing 1.5s ease-out; pointer-events: none; }
  .milestone-ring:nth-child(2) { animation-delay: 0.2s; border-color: rgba(240,144,48,0.3); }
  .milestone-ring:nth-child(3) { animation-delay: 0.4s; border-color: rgba(255,214,153,0.3); }

  /* === Reward Feedback Modal (post-claim) === */
  .reward-feedback-backdrop {
    position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    background: rgba(33,44,60,0.75); animation: flashIn 0.3s ease; cursor: pointer;
  }
  .reward-feedback {
    width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 128px; position: relative;
    background: linear-gradient(to top, rgba(141,112,91,0.85), rgba(108,85,72,0.85));
    border-top: 6px solid #cea98e; border-bottom: 6px solid #cea98e;
    animation: celebrationPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .reward-feedback .rf-title {
    font-size: 48px; font-weight: 800; color: #faf093; text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4); letter-spacing: -1px;
  }
  .reward-feedback .rf-glitter {
    display: flex; gap: 10px; align-items: center; margin: 8px 0 16px;
  }
  .reward-feedback .rf-glitter-star {
    width: 24px; height: 24px; opacity: 0.6;
  }
  .reward-feedback .rf-items {
    display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap;
  }
  .reward-feedback .rf-item {
    width: 100px; height: 100px; border-radius: 12px; border: 3px solid #b0896b;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    position: relative;
  }
  .reward-feedback .rf-item .rf-new-badge {
    position: absolute; top: -6px; right: -6px; background: #c54a3e; color: white;
    font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px;
  }
  .reward-feedback .rf-dismiss {
    color: rgba(234,209,184,0.5); font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px; pointer-events: none;
  }

  /* === Event Details Sub-Panel === */
  .details-overlay { position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: rgba(33,44,60,0.5); animation: flashIn 0.2s ease; }
  .details-panel { background: #fff7e6; border: 3px solid #cea98e; border-radius: 16px; width: 480px; max-height: 80%; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .details-header { background: linear-gradient(to bottom, rgba(141,112,91,0.9), rgba(108,85,72,0.9)); padding: 12px 16px; border-radius: 13px 13px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .details-header h3 { font-size: 16px; font-weight: 800; color: #faf093; text-shadow: 0 1px 3px rgba(0,0,0,0.35); }
  .details-body { padding: 16px 20px; }
  .details-lore { background: linear-gradient(to bottom, rgba(234,209,184,0.4), rgba(234,209,184,0.2)); border: 1px solid #ead1b8; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; font-style: italic; color: #6c5548; line-height: 1.5; }
  .details-section { margin-bottom: 14px; }
  .details-section h4 { font-size: 12px; font-weight: 800; color: #8d705b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .details-rule { font-size: 12px; color: #6c5548; line-height: 1.5; padding: 4px 0 4px 14px; position: relative; }
  .details-rule::before { content: '\2022'; position: absolute; left: 0; color: #b0896b; font-weight: 800; }
  .details-duration { display: flex; gap: 12px; margin-top: 4px; }
  .details-duration-item { flex: 1; background: rgba(234,209,184,0.3); border: 1px solid #ead1b8; border-radius: 8px; padding: 8px 12px; text-align: center; }
  .details-duration-item .dd-label { font-size: 10px; font-weight: 700; color: #b0896b; text-transform: uppercase; }
  .details-duration-item .dd-value { font-size: 14px; font-weight: 800; color: #6c5548; margin-top: 2px; }

  /* HUD badge */
  .hud-badge { position: absolute; bottom: 48px; right: 140px; z-index: 30; width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(to bottom, #f09030, #d06020); border: 3px solid #a04010; box-shadow: 0 3px 0 0 #803010; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: transform 0.1s; animation: cardGlow 2s ease-in-out infinite; }
  .hud-badge:active { transform: scale(0.9); }

  /* === Edge Case Side Panel === */
  .edge-panel { position: fixed; left: 0; top: 0; bottom: 0; z-index: 9999; display: flex; flex-direction: row; font-family: 'Nunito', sans-serif; }
  .edge-panel-drawer { width: 340px; height: 100%; background: rgba(33,44,60,0.95); border-right: 3px solid #b0896b; overflow-y: auto; padding: 16px 14px; transform: translateX(-100%); transition: transform 0.25s ease; }
  .edge-panel.open .edge-panel-drawer { transform: translateX(0); }
  .edge-panel-toggle { width: 36px; height: 100px; align-self: center; background: rgba(33,44,60,0.9); border: 2px solid #b0896b; border-left: none; border-radius: 0 10px 10px 0; color: #fff7e6; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-weight: 700; writing-mode: vertical-rl; letter-spacing: 1px; transition: background 0.15s; }
  .edge-panel-toggle:hover { background: rgba(108,85,72,0.9); }
  .edge-panel-title { font-size: 14px; font-weight: 800; color: #faf093; text-shadow: 0 1px 3px rgba(0,0,0,0.35); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid rgba(176,137,107,0.4); }
  .edge-case-item { background: rgba(255,247,230,0.08); border: 1px solid rgba(176,137,107,0.3); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .edge-case-item:hover { background: rgba(255,247,230,0.15); border-color: #b0896b; }
  .edge-case-item.active { background: rgba(224,123,57,0.2); border-color: #e07b39; }
  .edge-case-item h4 { font-size: 12px; font-weight: 800; color: #fff7e6; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .edge-case-item h4 .ec-num { background: #b0896b; color: #fff7e6; border-radius: 4px; font-size: 10px; padding: 1px 5px; font-weight: 800; flex-shrink: 0; }
  .edge-case-item.active h4 .ec-num { background: #e07b39; }
  .edge-case-item p { font-size: 10px; font-weight: 600; color: rgba(234,209,184,0.75); line-height: 1.35; margin-left: 30px; }
  .edge-case-reset { margin-top: 6px; padding: 8px 0; width: 100%; border-radius: 8px; background: linear-gradient(to bottom, rgba(141,112,91,0.5), rgba(108,85,72,0.5)); border: 1px solid rgba(176,137,107,0.4); color: #ead1b8; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .edge-case-reset:hover { background: linear-gradient(to bottom, rgba(141,112,91,0.7), rgba(108,85,72,0.7)); }
</style>

<body>

<div class="scale-wrapper" id="scaleWrapper">
  <div class="frame" id="app"></div>
</div>
<div id="edge-panel-root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
var e = React.createElement;
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;

var EVENT = {
  event_name: "Fortune Festival Login Rewards",
  total_days: 7,
  lore_blurb: "The lanterns are lit and fortune smiles on those who return each day!",
  reward_track: [
    { day:1, rarity:"common",   cat:"Gold",      name:"500 Gold",          icon:"\u{1FA99}", qty:"x1" },
    { day:2, rarity:"common",   cat:"Material",  name:"3x Wood + 3x Textile", icon:"\u{1FAB5}", qty:"x6" },
    { day:3, rarity:"uncommon", cat:"Pack",      name:"1x Trinket Pack",   icon:"\u{1F381}", qty:"x1" },
    { day:4, rarity:"uncommon", cat:"Gold",      name:"1,000 Gold",        icon:"\u{1FA99}", qty:"x1" },
    { day:5, rarity:"rare",     cat:"Material",  name:"3x Mineral + 2x Textile", icon:"\u{1F48E}", qty:"x5" },
    { day:6, rarity:"rare",     cat:"Pack",      name:"1x Location Pack",  icon:"\u{1F30F}", qty:"x1" },
    { day:7, rarity:"exclusive",cat:"Pet",       name:"Lucky Koi Pet",     icon:"\u{1F420}", qty:"x1", milestone:true },
  ]
};

var CLAIMED_INIT = [1,2,3,4];
var CURRENT_DAY = 5;

// Cross-root state
var _listeners = [];
var _activeCase = 'default';
function getActiveCase() { return _activeCase; }
function setActiveCase(id) { _activeCase = id; _listeners.forEach(function(fn) { fn(id); }); }
function onActiveCaseChange(fn) { _listeners.push(fn); return function() { _listeners = _listeners.filter(function(f) { return f !== fn; }); }; }

var EDGE_CASES = [
  { id:'default', title:'Default state', desc:'Days 1\u20134 claimed, Day 5 claimable.', claimed:[1,2,3,4], currentDay:5, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'already-claimed', title:'Already claimed today', desc:'Player opens a second time. "Claimed" state, no dupe.', claimed:[1,2,3,4,5], currentDay:5, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'mid-event-join', title:'Joins mid-event (Day 5)', desc:'First login Day 5 of 7. Days 1\u20134 missed.', claimed:[], currentDay:5, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'midnight-double', title:'23:59 claim, 00:01 reopen', desc:'Claimed Day 6, reopens after UTC reset. Day 7 (milestone) claimable.', claimed:[1,2,3,4,5,6], currentDay:7, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'missed-days', title:'Missed several days', desc:'Logged Days 1, 2, 5 only. 3 claimed, track doesn\u2019t reset.', claimed:[1,2,5], currentDay:6, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'all-claimed', title:'All 7 days claimed', desc:'Full completion. All green.', claimed:[1,2,3,4,5,6,7], currentDay:7, eventActive:true, eventName:'Fortune Festival Login Rewards' },
  { id:'day-one', title:'First day of event', desc:'Day 1 claimable, rest locked.', claimed:[], currentDay:1, eventActive:true, eventName:'Fortune Festival Login Rewards' },
];

var RARITY_LABELS = {common:'Common',uncommon:'Uncommon',rare:'Rare',epic:'Epic',exclusive:'Event Exclusive'};
var RARITY_BGS = {common:'#EFFBBA',uncommon:'#EFFBBA',rare:'#BBF4F5',epic:'#EED3FF',exclusive:'#FFD699'};

var PARTICLE_COLORS = { epic:['#EED3FF','#c98aff','#9b59b6','#fff'], exclusive:['#FFD699','#f09030','#e07b39','#faf093','#fff'] };
function makeParticles(rarity) {
  var colors = PARTICLE_COLORS[rarity] || PARTICLE_COLORS.epic;
  var p = [];
  for (var i = 0; i < 12; i++) {
    var a = (i/12)*360, d = 30+Math.random()*25;
    var dx = Math.cos(a*Math.PI/180)*d, dy = Math.sin(a*Math.PI/180)*d;
    p.push(e('div',{key:i,className:'particle',style:{width:(4+Math.random()*4)+'px',height:(4+Math.random()*4)+'px',background:colors[Math.floor(Math.random()*colors.length)],left:'50%',top:'50%','--dx':dx+'px','--dy':dy+'px',animation:'particleFly 0.7s ease-out '+(i*30)+'ms forwards'}}));
  }
  return e('div',{className:'claim-particles'},p);
}

function App() {
  var s = useState(true); var open = s[0]; var setOpen = s[1];
  var s4 = useState(getActiveCase()); var activeCase = s4[0]; var localSetCase = s4[1];
  useEffect(function() {
    return onActiveCaseChange(function(id) {
      localSetCase(id);
      var sc = EDGE_CASES.find(function(c){return c.id===id;});
      if (sc && sc.eventActive) { setOpen(true); } else { setOpen(false); }
    });
  }, []);
  var scenario = EDGE_CASES.find(function(c){return c.id===activeCase;}) || EDGE_CASES[0];
  return e('div',{style:{width:'1920px',height:'1080px',position:'relative'}},
    e('img',{className:'bg-image',src:'https://www.figma.com/api/mcp/asset/968d51f9-a9f0-4d9c-9d65-60696721c653',alt:''}),
    e('div',{className:'caravan'},e('img',{src:'https://www.figma.com/api/mcp/asset/201b29f1-538e-44ef-9245-8bcb4b36a115',alt:''})),
    e('div',{className:'hud-component'},e('div',{className:'hud-buttons'},
      ['797300c0-4081-4582-b51f-977d6dbae5a5','f300a107-eea0-4fcb-88c2-faae6e44deb6','9e87a74a-3652-42cd-8197-3a0e79f79afc','718834f4-55d7-4e58-a3c4-2117ba982000','c157c47d-3241-4ac1-be2e-2f9bd337eee3'].map(function(id,i){return e('div',{key:i,className:'hud-btn'},e('img',{src:'https://www.figma.com/api/mcp/asset/'+id,alt:''}));})
    )),
    scenario.eventActive && open && e(LoginModal,{key:activeCase,onClose:function(){setOpen(false);},claimedInit:scenario.claimed,currentDay:scenario.currentDay,eventName:scenario.eventName}),
    scenario.eventActive && !open && e('div',{className:'hud-badge',onClick:function(){setOpen(true);}},'\u{1F3EE}'),
    !scenario.eventActive && e('div',{style:{position:'absolute',bottom:'48px',right:'140px',zIndex:30,background:'rgba(33,44,60,0.8)',borderRadius:'12px',padding:'12px 20px',border:'2px solid #b0896b',color:'#ead1b8',fontSize:'14px',fontWeight:700}},'Event has ended \u2014 no modal shown')
  );
}

function EdgeCasePanelRoot() {
  var s1 = useState(false); var panelOpen = s1[0]; var setPanelOpen = s1[1];
  var s2 = useState(getActiveCase()); var ac = s2[0]; var ls = s2[1];
  useEffect(function(){return onActiveCaseChange(function(id){ls(id);});},[]);
  return e('div',{className:'edge-panel'+(panelOpen?' open':'')},
    e('div',{className:'edge-panel-drawer'},
      e('div',{className:'edge-panel-title'},'\u{1F9EA} Edge Case Testing'),
      EDGE_CASES.map(function(ec,i){return e('div',{key:ec.id,className:'edge-case-item'+(ac===ec.id?' active':''),onClick:function(){setActiveCase(ec.id);}},e('h4',null,e('span',{className:'ec-num'},i+1),ec.title),e('p',null,ec.desc));}),
      e('button',{className:'edge-case-reset',onClick:function(){setActiveCase('default');}},'\u21BA Reset to default')
    ),
    e('button',{className:'edge-panel-toggle',onClick:function(){setPanelOpen(!panelOpen);}},panelOpen?'\u25C0 Tests':'Tests \u25B6')
  );
}

function EventDetailsPanel(props) {
  return e('div',{className:'details-overlay',onClick:function(ev){if(ev.target===ev.currentTarget)props.onClose();}},
    e('div',{className:'details-panel'},
      e('div',{className:'details-header'},e('h3',null,'\u{1F3EE} Event details'),e('button',{className:'close-btn',onClick:props.onClose,style:{position:'relative',right:0,top:0}},'\u00D7')),
      e('div',{className:'details-body'},
        e('div',{className:'details-lore'},'"',EVENT.lore_blurb,'"'),
        e('div',{className:'details-section'},e('h4',null,'Event duration'),e('div',{className:'details-duration'},
          e('div',{className:'details-duration-item'},e('div',{className:'dd-label'},'Start'),e('div',{className:'dd-value'},'Jan 15, 2026')),
          e('div',{className:'details-duration-item'},e('div',{className:'dd-label'},'End'),e('div',{className:'dd-value'},'Jan 28, 2026')),
          e('div',{className:'details-duration-item'},e('div',{className:'dd-label'},'Reward days'),e('div',{className:'dd-value'},EVENT.total_days+' days'))
        )),
        e('div',{className:'details-section'},e('h4',null,'How it works'),
          e('div',{className:'details-rule'},'Open Trailbound each day to claim your daily reward.'),
          e('div',{className:'details-rule'},'Rewards track total days logged in, not consecutive streaks.'),
          e('div',{className:'details-rule'},'Missed days cannot be recovered \u2014 but your progress never resets.'),
          e('div',{className:'details-rule'},'Daily reset happens at 00:00 UTC for all players.'),
          e('div',{className:'details-rule'},'Event-exclusive items may rotate back in future events.')
        ),
        e('div',{className:'details-section'},e('h4',null,'Rarity guide'),e('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
          ['common','uncommon','rare','epic','exclusive'].map(function(r){return e('span',{key:r,style:{background:RARITY_BGS[r],padding:'3px 10px',borderRadius:'6px',fontSize:'11px',fontWeight:700,color:'#6c5548'}},RARITY_LABELS[r]);})
        ))
      )
    )
  );
}

function RewardFeedbackModal(props) {
  var r = props.reward;
  var glitterUrl = 'https://www.figma.com/api/mcp/asset/bfb8895f-a4a8-4a52-affe-37839e68e83c';
  return e('div',{className:'reward-feedback-backdrop',onClick:props.onClose},
    e('div',{className:'reward-feedback',onClick:function(ev){ev.stopPropagation();}},
      e('div',{className:'rf-title'},r.name+' received!'),
      e('div',{className:'rf-glitter'},
        e('img',{className:'rf-glitter-star',src:glitterUrl,alt:''}),
        e('img',{className:'rf-glitter-star',src:glitterUrl,alt:''}),
        e('img',{className:'rf-glitter-star',src:glitterUrl,alt:''})
      ),
      e('div',{className:'rf-items'},
        e('div',{className:'rf-item',style:{background:RARITY_BGS[r.rarity]}},
          r.icon,
          e('div',{className:'rf-new-badge'},'New')
        )
      )
    ),
    e('div',{className:'rf-dismiss'},'Click anywhere to close')
  );
}

function LoginModal(props) {
  var curDay = props.currentDay || CURRENT_DAY;
  var s1 = useState((props.claimedInit||CLAIMED_INIT).slice()); var claimed=s1[0]; var setClaimed=s1[1];
  var s2 = useState(false); var animDay=s2[0]; var setAnimDay=s2[1];
  var s3 = useState(false); var debouncing=s3[0]; var setDebouncing=s3[1];
  var s4 = useState(false); var showDetails=s4[0]; var setShowDetails=s4[1];
  var s5 = useState(false); var milestoneReward=s5[0]; var setMilestoneReward=s5[1];
  var s6 = useState(false); var claimedReward=s6[0]; var setClaimedReward=s6[1];
  var isTodayClaimed = claimed.indexOf(curDay) !== -1;

  function handleClaim() {
    if (debouncing||isTodayClaimed) return;
    setDebouncing(true); setAnimDay(curDay);
    var reward = EVENT.reward_track[curDay-1];
    var dur = reward&&(reward.rarity==='exclusive'?1800:reward.rarity==='epic'?1400:1000);
    setTimeout(function(){
      setClaimed(function(p){return p.concat([curDay]);});
      setTimeout(function(){
        setAnimDay(false);setDebouncing(false);
        // Show reward feedback modal
        if(reward) setClaimedReward(reward);
      },dur||1000);
    },500);
  }

  function dayState(d) {
    if(claimed.indexOf(d)!==-1)return 'claimed';
    if(d===curDay)return 'claimable';
    if(d<curDay)return 'unclaimed';
    return 'upcoming';
  }
  function statusText(st) {
    if(st==='claimed')return '\u2713 Claimed';
    if(st==='claimable')return 'Claimable';
    if(st==='unclaimed')return 'Missed';
    return 'Locked';
  }

  var todayReward = curDay<=EVENT.total_days ? EVENT.reward_track[curDay-1] : null;
  var pct = Math.min(100, (claimed.length/EVENT.total_days)*100);

  function dayCard(r, isBig) {
    var state = dayState(r.day);
    var cls = 'day-card '+state+(isBig?' big':'');
    var isAnim = animDay===r.day;
    return e('div',{key:r.day,className:cls,onClick:state==='claimable'?handleClaim:undefined},
      isAnim && e('div',{className:'claim-flash r-'+r.rarity},
        (r.rarity==='epic'||r.rarity==='exclusive')&&makeParticles(r.rarity),
        e('div',{className:'claim-flash-content'},e('div',{className:'claim-flash-icon'},r.icon),e('div',{className:'claim-flash-text'},'Claimed!'))
      ),
      e('div',{className:'day-card-header'},e('div',{className:'day-label'},'Day'),e('div',{className:'day-num'},r.day)),
      e('div',{className:'status-badge'},statusText(state)),
      e('div',{className:'day-card-body'},
        e('div',{className:'card-reward-icon'},e('div',{className:'card-reward-inner '+r.rarity},r.icon)),
        e('div',{className:'card-reward-name'},r.name),
        e('span',{className:'card-cat-badge cat-'+r.cat.toLowerCase()},r.cat),
        e('div',{className:'card-reward-qty'},r.qty)
      )
    );
  }

  return e('div',{className:'modal-backdrop',onClick:function(ev){if(ev.target===ev.currentTarget)props.onClose();}},
    e('div',{className:'modal-outer'},
      e('div',{className:'modal-titlebar'},
        e('span',{className:'modal-title'},props.eventName||EVENT.event_name),
        e('button',{className:'close-btn',onClick:props.onClose},'\u00D7')
      ),
      e('div',{className:'modal-inner'},
        // Left panel (banner-style)
        e('div',{className:'left-panel'},
          e('div',{className:'left-panel-lanterns'},'\u{1F3EE}\u{1F3EE}'),
          e('div',{className:'lp-timer'},'\u23F3 Reset in 23h'),
          e('div',{className:'lp-title'},'Your daily\nlogin rewards'),
          e('div',{className:'lp-counter'},claimed.length+' of '+EVENT.total_days+' days claimed'),
          e('div',{className:'lp-progress'},
            e('div',{className:'lp-progress-bar'},e('div',{className:'lp-progress-fill',style:{width:pct+'%'}})),
            e('div',{className:'lp-progress-text'},claimed.length,e('span',null,' / '+EVENT.total_days))
          ),
          e('div',{className:'lp-art'},'\u{1F3EE}'),
          e('div',{className:'lp-footer'},
            e('button',{className:'lp-link',onClick:function(){setShowDetails(true);}},'\u2139\uFE0F Event details & rules'),
            isTodayClaimed && e('div',{className:'lp-message'},'You already claimed today. Come back tomorrow!')
          )
        ),
        // Right panel (rewards)
        e('div',{className:'right-panel'},
          // CSS Grid: 4 columns — Days 1-4 each span 1, Days 5-6 span 1, Day 7 spans 2
          e('div',{className:'day-cards-area'},
            EVENT.reward_track.map(function(r){return dayCard(r, r.milestone);})
          ),
          // Claim button
          e('div',{className:'modal-footer'},
            e('button',{
              className:'btn-primary'+(isTodayClaimed?' claimed-state':''),
              onClick:isTodayClaimed?undefined:handleClaim,
              disabled:debouncing
            },isTodayClaimed?'\u2713 Claimed today':(curDay>EVENT.total_days?'Event complete':'Claim Day '+curDay))
          )
        )
      ),
      showDetails && e(EventDetailsPanel,{onClose:function(){setShowDetails(false);}}),
      milestoneReward && e('div',{className:'milestone-celebration'},
        e('div',{className:'milestone-ring'}),e('div',{className:'milestone-ring'}),e('div',{className:'milestone-ring'}),
        makeParticles('exclusive'),
        e('div',{className:'milestone-celebration-content'},
          e('div',{className:'mc-icon'},milestoneReward.icon),
          e('div',{className:'mc-title'},milestoneReward.day===EVENT.total_days?'Final reward unlocked!':'Milestone reached!'),
          e('div',{className:'mc-subtitle'},'Day '+milestoneReward.day+' of '+EVENT.total_days),
          e('div',{className:'mc-reward-name'},milestoneReward.name),
          e('button',{className:'mc-dismiss',onClick:function(){setMilestoneReward(false);}},'Tap to continue')
        )
      )
    ),
    // Reward feedback modal — clicking anywhere closes both modals
    claimedReward && e(RewardFeedbackModal,{reward:claimedReward,onClose:function(){setClaimedReward(false);props.onClose();}}),
    !claimedReward && e('div',{style:{color:'rgba(234,209,184,0.5)',fontSize:'12px',fontWeight:600,letterSpacing:'0.5px',pointerEvents:'none'}},'Click anywhere to close')
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
ReactDOM.createRoot(document.getElementById('edge-panel-root')).render(e(EdgeCasePanelRoot));

function scaleFrame() {
  var w = document.getElementById('scaleWrapper');
  var sx = window.innerWidth/1920, sy = window.innerHeight/1080, s = Math.min(sx,sy);
  w.style.transform = 'scale('+s+')';
  w.style.left = ((window.innerWidth-1920*s)/2)+'px';
  w.style.top = ((window.innerHeight-1080*s)/2)+'px';
}
scaleFrame();
window.addEventListener('resize', scaleFrame);
</script>
</body>
